<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Queue — TV Tracker</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#131720">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Queue">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" href="icons/icon-180.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="topbar">
  <div class="brand" id="brandTitle">UP NEXT</div>
  <button class="iconbtn" id="refreshBtn" title="Refresh episode data" aria-label="Refresh">&#8635;</button>
</header>

<main id="view" class="view"></main>

<nav class="tabbar" role="tablist">
  <button class="tab" data-route="upnext" role="tab">
    <span class="tab-glyph">&#9654;</span><span class="tab-label">Up Next</span>
  </button>
  <button class="tab" data-route="shows" role="tab">
    <span class="tab-glyph">&#9638;</span><span class="tab-label">My Shows</span>
  </button>
  <button class="tab" data-route="search" role="tab">
    <span class="tab-glyph">&#8981;</span><span class="tab-label">Search</span>
  </button>
  <button class="tab" data-route="settings" role="tab">
    <span class="tab-glyph">&#9881;</span><span class="tab-label">Settings</span>
  </button>
</nav>

<div id="toast" class="toast" role="status"></div>

<script src="app.js"></script>
</body>
</html>
